<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0f1e; color: #e8eaf0; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #0d1426; border: 1px solid #1e2a45; border-radius: 20px; padding: 36px 28px; width: 100%; max-width: 380px; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    p.sub { font-size: 13px; color: #4a5568; margin-bottom: 24px; }
    label { display: block; font-size: 12px; color: #a0aec0; margin-bottom: 5px; margin-top: 14px; }
    input { width: 100%; background: #1a2340; border: 1px solid #1e2a45; border-radius: 12px; padding: 12px 16px; color: #e8eaf0; font-family: 'Inter', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #4f8ef7; }
    input::placeholder { color: #4a5568; }
    .hint { font-size: 11px; color: #4a5568; margin-top: 4px; }
    .error { background: #2d1a1a; border: 1px solid #7f1d1d; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #f87171; margin-top: 14px; }
    button { width: 100%; margin-top: 22px; padding: 13px; background: linear-gradient(135deg, #4f8ef7, #3b6fd4); border: none; border-radius: 12px; color: white; font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 0 16px rgba(79,142,247,0.3); }
    .link { text-align: center; margin-top: 16px; font-size: 13px; color: #4a5568; }
    .link a { color: #4f8ef7; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create account</h1>
    <p class="sub">Join the chat</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <label>Display Name</label>
      <input type="text" name="display_name" placeholder="Your name (shown to others)"/>
      <label>Username</label>
      <input type="text" name="username" placeholder="login username" required/>
      <label>User ID</label>
      <input type="text" name="user_id" placeholder="e.g. 1234 (numbers only)" pattern="\d{4,}" required/>
      <div class="hint">Min 4 digits. Used by friends to find you. Cannot be changed.</div>
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required/>
      <button type="submit">Create account</button>
    </form>
    <div class="link">Already have an account? <a href="/login">Sign in</a></div>
  </div>
</body>
</html>
