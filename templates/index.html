<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chatly</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="/static/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0f1e; color: #e8eaf0; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* ── Contacts ── */
    #contactsScreen { display: flex; flex-direction: column; height: 100vh; background: #0d1426; }
    .contacts-header { padding: 18px 16px 12px; border-bottom: 1px solid #1e2a45; display: flex; align-items: center; justify-content: space-between; }
    .contacts-header h2 { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .avatar-sm { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #4f8ef7, #a78bfa); display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; overflow: hidden; flex-shrink: 0; }
    .avatar-sm img { width: 100%; height: 100%; object-fit: cover; }

    .search-box { padding: 10px 12px 6px; }
    .search-box input { width: 100%; background: #1a2340; border: 1px solid #1e2a45; border-radius: 12px; padding: 10px 14px; color: #e8eaf0; font-size: 14px; outline: none; font-family: 'Inter', sans-serif; }
    .search-box input:focus { border-color: #4f8ef7; }
    .search-box input::placeholder { color: #4a5568; }

    .tab-bar { display: flex; border-bottom: 1px solid #1e2a45; }
    .tab { flex: 1; padding: 11px; text-align: center; font-size: 13px; font-weight: 600; color: #4a5568; cursor: pointer; font-family: 'Space Grotesk', sans-serif; border-bottom: 2px solid transparent; transition: color 0.2s; }
    .tab.active { color: #4f8ef7; border-bottom-color: #4f8ef7; }
    .notif-dot { display: inline-block; width: 7px; height: 7px; background: #f87171; border-radius: 50%; margin-left: 4px; vertical-align: middle; }

    .users-list { flex: 1; overflow-y: auto; padding: 6px; scrollbar-width: thin; scrollbar-color: #1e2a45 transparent; }
    .user-item { display: flex; align-items: center; gap: 12px; padding: 11px 10px; border-radius: 14px; cursor: pointer; transition: background 0.15s; position: relative; }
    .user-item:hover, .user-item:active { background: #1a2340; }
    .user-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #4f8ef7, #a78bfa); display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; flex-shrink: 0; position: relative; overflow: hidden; }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .online-badge { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; position: absolute; bottom: 1px; right: 1px; border: 2px solid #0d1426; }
    .user-info .name { font-size: 14px; font-weight: 500; }
    .user-info .uid { font-size: 11px; color: #4a5568; margin-top: 1px; }
    .action-btns { display: flex; gap: 6px; margin-left: auto; }
    .btn-sm { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; font-family: 'Space Grotesk', sans-serif; }
    .btn-accept { background: #4f8ef7; color: white; }
    .btn-decline { background: #1a2340; color: #f87171; border: 1px solid #f87171; }
    .btn-add { background: #1a2340; color: #4f8ef7; border: 1px solid #4f8ef7; }
    .btn-remove { background: transparent; color: #f87171; border: none; font-size: 16px; cursor: pointer; margin-left: auto; padding: 4px 8px; }
    .empty-msg { color: #4a5568; font-size: 13px; padding: 20px 14px; text-align: center; }

    /* ── Chat ── */
    #chatScreen { display: none; flex-direction: column; height: 100vh; }
    .chat-bg { flex: 1; display: flex; flex-direction: column; background-size: cover; background-position: center; }
    .chat-header { padding: 14px; background: #0d1426; border-bottom: 1px solid #1e2a45; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .back-btn { background: none; border: none; color: #4f8ef7; font-size: 22px; cursor: pointer; padding: 2px 6px 2px 0; }
    .chat-header .ch-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #4f8ef7, #a78bfa); display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; flex-shrink: 0; overflow: hidden; }
    .chat-header .ch-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .chat-header h3 { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; }
    .chat-header .sub { font-size: 12px; color: #4f8ef7; }
    .e2e-badge { font-size: 11px; color: #22c55e; text-align: center; padding: 5px; background: rgba(10,26,15,0.85); border-bottom: 1px solid #1e2a45; flex-shrink: 0; }

    #messages { flex: 1; overflow-y: auto; padding: 14px 12px; display: flex; flex-direction: column; gap: 8px; list-style: none; scrollbar-width: thin; scrollbar-color: rgba(30,42,69,0.5) transparent; }
    #messages li { max-width: 78%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; animation: slideIn 0.2s ease; background: rgba(26,35,64,0.92); align-self: flex-start; border-bottom-left-radius: 4px; word-break: break-word; }
    #messages li .msg-sender { font-size: 11px; color: #4f8ef7; margin-bottom: 3px; font-weight: 600; }
    #messages li .reply-preview { background: rgba(0,0,0,0.2); border-left: 3px solid #4f8ef7; padding: 4px 8px; border-radius: 4px; font-size: 12px; color: #a0aec0; margin-bottom: 6px; }
    #messages li.sent { align-self: flex-end; background: linear-gradient(135deg, #4f8ef7, #3b6fd4); color: #fff; border-bottom-right-radius: 4px; border-bottom-left-radius: 18px; }
    #messages li.sent .msg-sender { color: rgba(255,255,255,0.7); }
    #messages li.sent .reply-preview { background: rgba(0,0,0,0.15); border-left-color: rgba(255,255,255,0.5); }
    #messages li img.chat-img { max-width: 200px; border-radius: 10px; display: block; margin-top: 6px; cursor: pointer; }
    #messages li video.chat-vid { max-width: 200px; border-radius: 10px; display: block; margin-top: 6px; }
    #messages li a.chat-file { display: inline-flex; align-items: center; gap: 6px; color: inherit; text-decoration: none; background: rgba(0,0,0,0.15); padding: 6px 10px; border-radius: 8px; margin-top: 6px; font-size: 13px; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Swipe to reply */
    #messages li { transition: transform 0.15s; cursor: pointer; }

    .reply-bar { background: #1a2340; border-left: 3px solid #4f8ef7; padding: 8px 12px; font-size: 13px; color: #a0aec0; display: none; flex-shrink: 0; position: relative; }
    .reply-bar .cancel-reply { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #f87171; font-size: 18px; cursor: pointer; }

    .input-area { padding: 10px 12px; border-top: 1px solid #1e2a45; display: flex; gap: 8px; align-items: center; background: #0d1426; flex-shrink: 0; }
    .attach-btn { background: none; border: none; color: #4a5568; font-size: 22px; cursor: pointer; padding: 4px; flex-shrink: 0; }
    .attach-btn:hover { color: #4f8ef7; }
    #msg { flex: 1; background: #1a2340; border: 1px solid #1e2a45; border-radius: 24px; padding: 12px 16px; color: #e8eaf0; font-family: 'Inter', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
    #msg:focus { border-color: #4f8ef7; }
    #msg::placeholder { color: #4a5568; }
    #sendBtn { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #4f8ef7, #3b6fd4); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 12px rgba(79,142,247,0.3); flex-shrink: 0; }
    #sendBtn svg { width: 18px; height: 18px; fill: white; }
    #fileInput { display: none; }

    /* ── Profile ── */
    #profileScreen { display: none; flex-direction: column; height: 100vh; background: #0d1426; overflow-y: auto; }
    .profile-header { padding: 16px; border-bottom: 1px solid #1e2a45; display: flex; align-items: center; gap: 12px; }
    .profile-cover { height: 160px; background: linear-gradient(135deg, #1a2340, #0d1426); position: relative; overflow: hidden; }
    .profile-cover img { width: 100%; height: 100%; object-fit: cover; }
    .profile-cover-edit { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); border: none; color: white; padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
    .profile-avatar-wrap { display: flex; justify-content: center; margin-top: -36px; position: relative; z-index: 1; }
    .profile-avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #4f8ef7, #a78bfa); display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 600; border: 3px solid #0d1426; overflow: hidden; cursor: pointer; }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-info { text-align: center; padding: 12px 16px 20px; }
    .profile-info h2 { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 600; }
    .profile-info .uid { font-size: 13px; color: #4f8ef7; margin-top: 4px; }
    .profile-section { padding: 0 16px 16px; }
    .profile-section h3 { font-family: 'Space Grotesk', sans-serif; font-size: 13px; color: #4a5568; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
    .profile-btn { display: flex; align-items: center; gap: 12px; padding: 14px; background: #1a2340; border-radius: 12px; cursor: pointer; margin-bottom: 8px; border: none; width: 100%; color: #e8eaf0; font-family: 'Inter', sans-serif; font-size: 14px; }
    .profile-btn .icon { font-size: 18px; }
    .profile-btn.danger { color: #f87171; }
    #avatarInput, #wallpaperInput { display: none; }
  </style>
</head>
<body>

  <!-- Contacts -->
  <div id="contactsScreen">
    <div class="contacts-header">
      <h2>Chatly</h2>
      <div class="header-right">
        <div class="avatar-sm" id="myAvatarBtn" onclick="openProfile()">
          <span id="myAvatarInitial">?</span>
        </div>
      </div>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search by username or ID..." oninput="onSearch()"/>
    </div>
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('friends', this)">Chats</div>
      <div class="tab" onclick="switchTab('requests', this)" id="reqTab">Requests</div>
      <div class="tab" onclick="switchTab('search', this)">Add</div>
    </div>
    <div class="users-list" id="usersList"></div>
  </div>

  <!-- Chat -->
  <div id="chatScreen">
    <div class="chat-header">
      <button class="back-btn" onclick="goBack()">&#8592;</button>
      <div class="ch-avatar" id="chatAvatar"></div>
      <div style="flex:1">
        <h3 id="chatName"></h3>
        <div class="sub" id="chatStatus"></div>
      </div>
      <button class="btn-remove" id="removeFriendBtn" title="Remove friend">✕</button>
    </div>
    <div class="e2e-badge">🔒 End-to-end encrypted</div>
    <div class="chat-bg" id="chatBg">
      <ul id="messages"></ul>
      <div class="reply-bar" id="replyBar">
        <span id="replyText"></span>
        <button class="cancel-reply" onclick="cancelReply()">×</button>
      </div>
      <div class="input-area">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="file" id="fileInput" accept="image/*,video/*,*/*" onchange="sendFile(this)"/>
        <input id="msg" type="text" placeholder="Type a message..." autocomplete="off"/>
        <button id="sendBtn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Profile -->
  <div id="profileScreen">
    <div class="profile-header">
      <button class="back-btn" onclick="closeProfile()">&#8592;</button>
      <span style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;">Profile</span>
    </div>
    <div class="profile-cover" id="profileCover">
      <button class="profile-cover-edit" onclick="document.getElementById('wallpaperInput').click()">Change wallpaper</button>
    </div>
    <div class="profile-avatar-wrap">
      <div class="profile-avatar" id="profileAvatarBig" onclick="document.getElementById('avatarInput').click()">
        <span id="profileAvatarInitial"></span>
      </div>
    </div>
    <div class="profile-info">
      <h2 id="profileUsername"></h2>
      <div class="uid" id="profileUID"></div>
    </div>
    <div class="profile-section">
      <button class="profile-btn danger" onclick="window.location='/logout'">
        <span class="icon">🚪</span> Sign out
      </button>
    </div>
    <input type="file" id="avatarInput" accept="image/*" onchange="uploadAvatar(this)"/>
    <input type="file" id="wallpaperInput" accept="image/*" onchange="uploadWallpaper(this)"/>
  </div>

<script>
const me = "{{ username }}";
let currentChat = null;
let onlineUsers = [];
let currentTab = 'friends';
let publicKeys = {};
let myPrivateKey = null;
let myPublicKey = null;
let replyingTo = null;
let myProfile = null;

const socket = io({ autoConnect: false });

// ── History API (back button fix) ────────────────────────────
window.addEventListener('popstate', function(e) {
  if (document.getElementById('chatScreen').style.display !== 'none') {
    goBack();
    history.pushState(null, '', window.location.pathname);
  } else if (document.getElementById('profileScreen').style.display !== 'none') {
    closeProfile();
    history.pushState(null, '', window.location.pathname);
  }
});
history.pushState(null, '', window.location.pathname);

// ── E2E ──────────────────────────────────────────────────────
async function initKeys() {
  const stored = localStorage.getItem('privkey_' + me);
  if (stored) {
    myPrivateKey = await crypto.subtle.importKey('jwk', JSON.parse(stored), { name: 'RSA-OAEP', hash: 'SHA-256' }, false, ['decrypt']);
    const pubStored = localStorage.getItem('pubkey_' + me);
    if (pubStored) {
      myPublicKey = await crypto.subtle.importKey('jwk', JSON.parse(pubStored), { name: 'RSA-OAEP', hash: 'SHA-256' }, false, ['encrypt']);
      const check = await fetch('/pubkey/' + me).then(r => r.json());
      if (!check.key) {
        await fetch('/save_key', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key: pubStored }) });
      }
    }
  } else {
    const pair = await crypto.subtle.generateKey({ name: 'RSA-OAEP', modulusLength: 2048, publicExponent: new Uint8Array([1, 0, 1]), hash: 'SHA-256' }, true, ['encrypt', 'decrypt']);
    myPrivateKey = pair.privateKey;
    myPublicKey = pair.publicKey;
    const privJwk = await crypto.subtle.exportKey('jwk', pair.privateKey);
    const pubJwk = await crypto.subtle.exportKey('jwk', pair.publicKey);
    localStorage.setItem('privkey_' + me, JSON.stringify(privJwk));
    localStorage.setItem('pubkey_' + me, JSON.stringify(pubJwk));
    let saved = false;
    while (!saved) {
      try {
        const r = await fetch('/save_key', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key: JSON.stringify(pubJwk) }) });
        const d = await r.json();
        if (d.ok) saved = true;
      } catch (e) { await new Promise(r => setTimeout(r, 1000)); }
    }
  }
}

async function getPublicKey(username) {
  if (publicKeys[username]) return publicKeys[username];
  const res = await fetch('/pubkey/' + username);
  const data = await res.json();
  if (!data.key) return null;
  const key = await crypto.subtle.importKey('jwk', JSON.parse(data.key), { name: 'RSA-OAEP', hash: 'SHA-256' }, false, ['encrypt']);
  publicKeys[username] = key;
  return key;
}

async function encryptWith(key, text) {
  const buf = await crypto.subtle.encrypt({ name: 'RSA-OAEP' }, key, new TextEncoder().encode(text));
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}

async function decryptMsg(cipher) {
  try {
    const buf = Uint8Array.from(atob(cipher), c => c.charCodeAt(0));
    const dec = await crypto.subtle.decrypt({ name: 'RSA-OAEP' }, myPrivateKey, buf);
    return new TextDecoder().decode(dec);
  } catch { return '🔒'; }
}

// ── Profile ───────────────────────────────────────────────────
async function loadMyProfile() {
  const res = await fetch('/profile');
  myProfile = await res.json();
  const initial = me[0].toUpperCase();
  document.getElementById('myAvatarInitial').textContent = initial;
  document.getElementById('profileAvatarInitial').textContent = initial;
  document.getElementById('profileUsername').textContent = me;
  document.getElementById('profileUID').textContent = '#' + (myProfile.user_id || '0000');
  if (myProfile.avatar_url) {
    document.getElementById('myAvatarBtn').innerHTML = `<img src="${myProfile.avatar_url}"/>`;
    document.getElementById('profileAvatarBig').innerHTML = `<img src="${myProfile.avatar_url}"/>`;
  }
  if (myProfile.wallpaper_url) {
    document.getElementById('profileCover').style.backgroundImage = `url(${myProfile.wallpaper_url})`;
    document.getElementById('profileCover').style.backgroundSize = 'cover';
  }
}

function openProfile() {
  document.getElementById('contactsScreen').style.display = 'none';
  document.getElementById('profileScreen').style.display = 'flex';
  document.getElementById('profileScreen').style.flexDirection = 'column';
  history.pushState(null, '', window.location.pathname);
}

function closeProfile() {
  document.getElementById('profileScreen').style.display = 'none';
  document.getElementById('contactsScreen').style.display = 'flex';
}

async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  const res = await fetch('/upload_avatar', { method: 'POST', body: fd });
  const data = await res.json();
  if (data.ok) {
    document.getElementById('myAvatarBtn').innerHTML = `<img src="${data.url}"/>`;
    document.getElementById('profileAvatarBig').innerHTML = `<img src="${data.url}"/>`;
  }
}

async function uploadWallpaper(input) {
  const file = input.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  const res = await fetch('/upload_wallpaper', { method: 'POST', body: fd });
  const data = await res.json();
  if (data.ok) {
    document.getElementById('chatBg').style.backgroundImage = `url(${data.url})`;
    document.getElementById('profileCover').style.backgroundImage = `url(${data.url})`;
  }
}

// ── Navigation ────────────────────────────────────────────────
function goBack() {
  document.getElementById('chatScreen').style.display = 'none';
  document.getElementById('contactsScreen').style.display = 'flex';
  currentChat = null;
  replyingTo = null;
}

// ── Tabs ──────────────────────────────────────────────────────
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('searchInput').value = '';
  renderTab();
}

async function renderTab() {
  const list = document.getElementById('usersList');
  list.innerHTML = '';
  if (currentTab === 'friends') {
    const res = await fetch('/friends');
    const friends = await res.json();
    if (!friends.length) { list.innerHTML = '<div class="empty-msg">No friends yet.<br>Go to Add tab.</div>'; return; }
    friends.forEach(u => renderUserItem(list, u, 'friend'));
  } else if (currentTab === 'requests') {
    const res = await fetch('/friend_requests');
    const reqs = await res.json();
    if (!reqs.length) { list.innerHTML = '<div class="empty-msg">No pending requests.</div>'; return; }
    reqs.forEach(sender => {
      const div = document.createElement('div');
      div.className = 'user-item';
      div.innerHTML = `
        <div class="user-avatar">${sender[0].toUpperCase()}</div>
        <div class="user-info"><div class="name">${sender}</div><div class="uid">sent you a request</div></div>
        <div class="action-btns">
          <button class="btn-sm btn-accept" onclick="respondRequest('${sender}','accept')">✓</button>
          <button class="btn-sm btn-decline" onclick="respondRequest('${sender}','decline')">✗</button>
        </div>`;
      list.appendChild(div);
    });
  } else {
    const q = document.getElementById('searchInput').value;
    const res = await fetch('/users?q=' + encodeURIComponent(q));
    const users = await res.json();
    if (!users.length) { list.innerHTML = '<div class="empty-msg">No users found.</div>'; return; }
    users.forEach(u => renderUserItem(list, u, 'add'));
  }
}

function renderUserItem(list, u, mode) {
  const div = document.createElement('div');
  div.className = 'user-item';
  const badge = u.online ? '<div class="online-badge"></div>' : '';
  const avatarContent = u.avatar_url ? `<img src="${u.avatar_url}"/>` : u.username[0].toUpperCase();
  let action = '';
  if (mode === 'add') action = `<button class="btn-sm btn-add" onclick="sendRequest('${u.username}')">Add</button>`;
  if (mode === 'friend') action = `<button class="btn-remove" onclick="removeFriend(event,'${u.username}')">✕</button>`;
  div.innerHTML = `
    <div class="user-avatar">${avatarContent}${badge}</div>
    <div class="user-info">
      <div class="name">${u.username}</div>
      <div class="uid">#${u.user_id || '0000'} · ${u.online ? 'online' : 'offline'}</div>
    </div>
    ${action}`;
  if (mode === 'friend') div.onclick = (e) => { if (!e.target.classList.contains('btn-remove')) openChat(u.username); };
  list.appendChild(div);
}

function onSearch() { renderTab(); }

async function sendRequest(to) {
  const res = await fetch('/send_request/' + to, { method: 'POST' });
  const data = await res.json();
  if (data.ok) alert('Request sent to ' + to);
  else alert(data.error || 'Already sent');
}

async function respondRequest(from, action) {
  await fetch('/respond_request/' + from + '/' + action, { method: 'POST' });
  document.getElementById('reqTab').innerHTML = 'Requests';
  renderTab();
}

async function removeFriend(e, username) {
  e.stopPropagation();
  if (!confirm('Remove ' + username + ' as friend?')) return;
  await fetch('/remove_friend/' + username, { method: 'POST' });
  renderTab();
}

// ── Chat ──────────────────────────────────────────────────────
async function openChat(username) {
  currentChat = username;
  document.getElementById('contactsScreen').style.display = 'none';
  const cs = document.getElementById('chatScreen');
  cs.style.display = 'flex';
  cs.style.flexDirection = 'column';
  document.getElementById('chatName').textContent = username;
  document.getElementById('chatStatus').textContent = onlineUsers.includes(username) ? 'online' : 'offline';
  document.getElementById('messages').innerHTML = '';
  cancelReply();
  history.pushState(null, '', window.location.pathname);

  // Set chat avatar
  const uProfile = await fetch('/profile/' + username).then(r => r.json());
  const avEl = document.getElementById('chatAvatar');
  if (uProfile.avatar_url) avEl.innerHTML = `<img src="${uProfile.avatar_url}"/>`;
  else avEl.textContent = username[0].toUpperCase();

  // Set wallpaper
  if (myProfile && myProfile.wallpaper_url) {
    document.getElementById('chatBg').style.backgroundImage = `url(${myProfile.wallpaper_url})`;
  }

  // Remove friend button
  document.getElementById('removeFriendBtn').onclick = async () => {
    if (!confirm('Remove ' + username + ' as friend?')) return;
    await fetch('/remove_friend/' + username, { method: 'POST' });
    goBack();
    renderTab();
  };

  await getPublicKey(username);

  const res = await fetch('/history/' + username);
  const msgs = await res.json();
  for (const m of msgs) {
    await renderMessage(m, m.sender === me);
  }
  document.getElementById('msg').focus();
}

async function renderMessage(m, isSent) {
  const ul = document.getElementById('messages');
  const li = document.createElement('li');
  if (isSent) li.classList.add('sent');

  let content = '';

  // Reply preview
  if (m.reply_to) {
    content += `<div class="reply-preview">↩ ${m.reply_to}</div>`;
  }

  li.innerHTML = `<div class="msg-sender">${isSent ? 'You' : m.sender}</div>${content}`;

  if (m.msg_type === 'image') {
    const img = document.createElement('img');
    img.src = m.media_url;
    img.className = 'chat-img';
    img.onclick = () => window.open(m.media_url, '_blank');
    li.appendChild(img);
  } else if (m.msg_type === 'video') {
    const vid = document.createElement('video');
    vid.src = m.media_url;
    vid.className = 'chat-vid';
    vid.controls = true;
    li.appendChild(vid);
  } else if (m.msg_type === 'file') {
    const a = document.createElement('a');
    a.href = m.media_url;
    a.className = 'chat-file';
    a.target = '_blank';
    a.innerHTML = '📄 Download file';
    li.appendChild(a);
  } else {
    // Text — decrypt
    let plain;
    if (isSent) {
      plain = m.sender_message ? await decryptMsg(m.sender_message) : '🔒';
    } else {
      plain = await decryptMsg(m.message);
    }
    const span = document.createElement('span');
    span.textContent = plain;
    li.appendChild(span);
  }

  // Swipe to reply
  let startX = 0;
  li.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
  li.addEventListener('touchend', e => {
    const diff = e.changedTouches[0].clientX - startX;
    if (diff > 60) {
      const text = li.querySelector('span') ? li.querySelector('span').textContent : '[media]';
      setReply(text);
    }
  });

  ul.appendChild(li);
  li.scrollIntoView({ behavior: 'smooth' });
}

function setReply(text) {
  replyingTo = text.length > 60 ? text.slice(0, 60) + '…' : text;
  document.getElementById('replyText').textContent = '↩ ' + replyingTo;
  document.getElementById('replyBar').style.display = 'block';
  document.getElementById('msg').focus();
}

function cancelReply() {
  replyingTo = null;
  document.getElementById('replyBar').style.display = 'none';
  document.getElementById('replyText').textContent = '';
}

async function sendMsg() {
  const input = document.getElementById('msg');
  const msg = input.value.trim();
  if (!msg || !currentChat) return;

  const receiverKey = await getPublicKey(currentChat);
  if (!receiverKey) { alert('Cannot get recipient key'); return; }

  const encryptedForReceiver = await encryptWith(receiverKey, msg);
  const encryptedForSelf = await encryptWith(myPublicKey, msg);

  socket.emit('private_message', {
    receiver: currentChat,
    message: encryptedForReceiver,
    sender_message: encryptedForSelf,
    msg_type: 'text',
    reply_to: replyingTo || ''
  });
  cancelReply();
  input.value = '';
}

async function sendFile(input) {
  const file = input.files[0];
  if (!file || !currentChat) return;

  const fd = new FormData();
  fd.append('file', file);
  const res = await fetch('/upload_media', { method: 'POST', body: fd });
  const data = await res.json();
  if (!data.ok) { alert('Upload failed'); return; }

  socket.emit('private_message', {
    receiver: currentChat,
    message: '',
    sender_message: '',
    msg_type: data.type === 'video' ? 'video' : data.type === 'image' ? 'image' : 'file',
    media_url: data.url,
    reply_to: replyingTo || ''
  });
  cancelReply();
  input.value = '';
}

socket.on('private_message', async function(data) {
  if (data.sender !== currentChat && !data.is_own) return;
  await renderMessage({
    sender: data.is_own ? me : data.sender,
    message: data.message,
    sender_message: data.message,
    msg_type: data.msg_type || 'text',
    media_url: data.media_url || '',
    reply_to: data.reply_to || ''
  }, !!data.is_own);
});

socket.on('friend_request', function() {
  document.getElementById('reqTab').innerHTML = `Requests<span class="notif-dot"></span>`;
});

socket.on('request_accepted', function() { renderTab(); });

socket.on('user_list_update', function(users) {
  onlineUsers = users;
  if (currentChat) document.getElementById('chatStatus').textContent = users.includes(currentChat) ? 'online' : 'offline';
});

document.getElementById('msg').addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

initKeys().then(async () => {
  socket.connect();
  await loadMyProfile();
  renderTab();
});
</script>
</body>
</html>
