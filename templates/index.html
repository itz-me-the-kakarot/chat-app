<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Chatly</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="/static/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0f1e; color: #e8eaf0; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* Screens */
    .screen { display: none; flex-direction: column; height: 100vh; }
    .screen.active { display: flex; }

    /* Header */
    .top-bar { padding: 16px; background: #0d1426; border-bottom: 1px solid #1e2a45; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .top-bar h2 { font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 600; flex: 1; }
    .back-btn { background: none; border: none; color: #4f8ef7; font-size: 22px; cursor: pointer; padding: 2px 8px 2px 0; }
    .icon-btn { background: none; border: none; color: #a0aec0; font-size: 20px; cursor: pointer; padding: 4px; }

    /* Avatar */
    .av { border-radius: 50%; background: linear-gradient(135deg,#4f8ef7,#a78bfa); display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk',sans-serif; font-weight:600; overflow:hidden; flex-shrink:0; }
    .av img { width:100%; height:100%; object-fit:cover; }
    .av-sm { width:34px; height:34px; font-size:13px; cursor:pointer; }
    .av-md { width:42px; height:42px; font-size:15px; position:relative; }
    .av-lg { width:64px; height:64px; font-size:22px; cursor:pointer; border:3px solid #0d1426; }
    .online-dot { width:10px; height:10px; background:#22c55e; border-radius:50%; position:absolute; bottom:1px; right:1px; border:2px solid #0d1426; }

    /* Search & tabs */
    .search-wrap { padding:10px 12px 6px; flex-shrink:0; }
    .search-wrap input { width:100%; background:#1a2340; border:1px solid #1e2a45; border-radius:12px; padding:10px 14px; color:#e8eaf0; font-size:14px; outline:none; font-family:'Inter',sans-serif; }
    .search-wrap input:focus { border-color:#4f8ef7; }
    .search-wrap input::placeholder { color:#4a5568; }
    .tabs { display:flex; border-bottom:1px solid #1e2a45; flex-shrink:0; }
    .tab { flex:1; padding:11px; text-align:center; font-size:13px; font-weight:600; color:#4a5568; cursor:pointer; font-family:'Space Grotesk',sans-serif; border-bottom:2px solid transparent; }
    .tab.active { color:#4f8ef7; border-bottom-color:#4f8ef7; }
    .ndot { display:inline-block; width:7px; height:7px; background:#f87171; border-radius:50%; margin-left:4px; vertical-align:middle; }

    /* Lists */
    .list { flex:1; overflow-y:auto; padding:6px; scrollbar-width:thin; scrollbar-color:#1e2a45 transparent; }
    .item { display:flex; align-items:center; gap:12px; padding:11px 10px; border-radius:14px; cursor:pointer; transition:background 0.15s; }
    .item:hover, .item:active { background:#1a2340; }
    .item-info .name { font-size:14px; font-weight:500; }
    .item-info .sub { font-size:12px; color:#4a5568; margin-top:2px; }
    .act-btns { display:flex; gap:6px; margin-left:auto; }
    .btn-xs { padding:6px 12px; border-radius:8px; font-size:12px; font-weight:600; border:none; cursor:pointer; font-family:'Space Grotesk',sans-serif; }
    .btn-blue { background:#4f8ef7; color:white; }
    .btn-red { background:#1a2340; color:#f87171; border:1px solid #f87171; }
    .btn-outline { background:#1a2340; color:#4f8ef7; border:1px solid #4f8ef7; }
    .remove-btn { background:none; border:none; color:#f87171; font-size:16px; cursor:pointer; margin-left:auto; padding:4px 8px; }
    .empty { color:#4a5568; font-size:13px; padding:20px; text-align:center; }

    /* Chat */
    #chatScreen { background:#0a0f1e; }
    .chat-bg { flex:1; display:flex; flex-direction:column; background-size:cover; background-position:center; overflow:hidden; }
    .e2e { font-size:11px; color:#22c55e; text-align:center; padding:5px; background:rgba(10,26,15,0.9); flex-shrink:0; }
    .typing-bar { font-size:12px; color:#4f8ef7; padding:4px 14px; background:rgba(13,20,38,0.8); display:none; flex-shrink:0; }

    #messages { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:6px; list-style:none; scrollbar-width:thin; scrollbar-color:rgba(30,42,69,.5) transparent; }
    #messages li { max-width:78%; padding:9px 13px; border-radius:18px; font-size:14px; line-height:1.5; animation:slideIn 0.2s ease; background:rgba(26,35,64,0.92); align-self:flex-start; border-bottom-left-radius:4px; word-break:break-word; position:relative; touch-action:pan-y; transition:transform 0.25s cubic-bezier(.4,0,.2,1); }
    #messages li .reply-drag-icon { position:absolute; top:50%; transform:translateY(-50%); font-size:20px; color:#4f8ef7; opacity:0; transition:opacity 0.15s; pointer-events:none; }
    #messages li:not(.sent) .reply-drag-icon { left:-28px; }
    #messages li.sent .reply-drag-icon { right:-28px; }
    #messages li.dragging .reply-drag-icon { opacity:1; }
    #messages li .msender { font-size:11px; color:#4f8ef7; margin-bottom:3px; font-weight:600; }
    #messages li .reply-prev { background:rgba(0,0,0,.2); border-left:3px solid #4f8ef7; padding:3px 8px; border-radius:4px; font-size:12px; color:#a0aec0; margin-bottom:5px; }
    #messages li .reactions { display:flex; flex-wrap:wrap; gap:4px; margin-top:5px; }
    #messages li .rxn { background:rgba(0,0,0,.2); border-radius:20px; padding:2px 7px; font-size:13px; cursor:pointer; }
    #messages li .ticks { font-size:11px; color:rgba(255,255,255,0.5); margin-top:3px; text-align:right; }
    #messages li .ticks.seen { color:#4f8ef7; }
    #messages li .del-text { color:#4a5568; font-style:italic; font-size:13px; }
    #messages li.sent { align-self:flex-end; background:linear-gradient(135deg,#4f8ef7,#3b6fd4); color:#fff; border-bottom-right-radius:4px; border-bottom-left-radius:18px; }
    #messages li.sent .msender { color:rgba(255,255,255,.7); }
    #messages li.sent .reply-prev { background:rgba(0,0,0,.15); border-left-color:rgba(255,255,255,.5); }
    #messages li img.cmedia { max-width:200px; border-radius:10px; display:block; margin-top:6px; cursor:pointer; }
    #messages li video.cmedia { max-width:200px; border-radius:10px; display:block; margin-top:6px; }
    #messages li .dload { display:inline-flex; align-items:center; gap:6px; color:inherit; text-decoration:none; background:rgba(0,0,0,.15); padding:6px 10px; border-radius:8px; margin-top:6px; font-size:13px; }
    @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .reply-bar { background:#1a2340; border-left:3px solid #4f8ef7; padding:8px 36px 8px 12px; font-size:13px; color:#a0aec0; display:none; flex-shrink:0; position:relative; }
    .reply-bar .x { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:#f87171; font-size:18px; cursor:pointer; }
    .input-row { padding:10px 12px; border-top:1px solid #1e2a45; display:flex; gap:8px; align-items:center; background:#0d1426; flex-shrink:0; }
    .attach { background:none; border:none; color:#4a5568; font-size:22px; cursor:pointer; }
    .attach:hover { color:#4f8ef7; }
    #msgInput { flex:1; background:#1a2340; border:1px solid #1e2a45; border-radius:24px; padding:12px 16px; color:#e8eaf0; font-family:'Inter',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; }
    #msgInput:focus { border-color:#4f8ef7; }
    #msgInput::placeholder { color:#4a5568; }
    #sendBtn, #micBtn { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,#4f8ef7,#3b6fd4); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 0 12px rgba(79,142,247,.3); flex-shrink:0; }
    #sendBtn svg, #micBtn svg { width:18px; height:18px; fill:white; }
    #micBtn { background:#1a2340; box-shadow:none; display:none; }
    #micBtn.recording { background:linear-gradient(135deg,#f87171,#ef4444); box-shadow:0 0 12px rgba(248,113,113,.4); }
    #fileInput { display:none; }

    /* Voice recording */
    .voice-rec-bar { display:none; flex:1; align-items:center; gap:10px; background:#1a2340; border-radius:24px; padding:8px 14px; min-height:44px; }
    .voice-rec-bar.active { display:flex; }
    .voice-rec-bar .rec-dot { width:10px; height:10px; background:#f87171; border-radius:50%; animation:recPulse 1s infinite; flex-shrink:0; }
    .voice-rec-bar .rec-dot.paused { animation:none; background:#4a5568; }
    @keyframes recPulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .voice-rec-bar .rec-time { font-size:14px; font-variant-numeric:tabular-nums; color:#e8eaf0; min-width:36px; }
    .voice-rec-bar .rec-hint { flex:1; font-size:12px; color:#4a5568; text-align:center; }
    .voice-rec-bar .rec-hint.locked { color:#4f8ef7; }
    .voice-rec-bar .voice-pause-btn, .voice-rec-bar .voice-cancel-btn { background:none; border:none; color:#a0aec0; font-size:20px; cursor:pointer; padding:4px; flex-shrink:0; }
    .voice-rec-bar .voice-cancel-btn { color:#f87171; }
    .voice-lock-indicator { position:absolute; right:60px; bottom:70px; background:#1a2340; border:1px solid #1e2a45; border-radius:12px; padding:8px 12px; font-size:12px; color:#4a5568; display:none; pointer-events:none; z-index:50; }
    .voice-lock-indicator.show { display:block; }
    .voice-lock-indicator.locked { color:#4f8ef7; border-color:#4f8ef7; }

    /* Toast */
    .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:#1a2340; border:1px solid #1e2a45; color:#e8eaf0; padding:10px 20px; border-radius:12px; font-size:14px; z-index:300; opacity:0; transition:opacity 0.25s, transform 0.25s; pointer-events:none; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* Chat header tap area */
    .chat-header-info { flex:1; min-width:0; cursor:pointer; display:flex; align-items:center; gap:10px; }
    .chat-header-text { flex:1; min-width:0; }

    /* Avatar crop modal */
    .crop-modal { display:none; position:fixed; inset:0; background:#0a0f1e; z-index:400; flex-direction:column; }
    .crop-modal.show { display:flex; }
    .crop-header { padding:16px; background:#0d1426; border-bottom:1px solid #1e2a45; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .crop-header button { background:none; border:none; color:#4f8ef7; font-size:15px; cursor:pointer; font-family:'Inter',sans-serif; padding:4px 8px; }
    .crop-header button.confirm { font-weight:600; }
    .crop-header span { font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:600; }
    .crop-viewport { flex:1; position:relative; overflow:hidden; touch-action:none; }
    .crop-viewport canvas { position:absolute; top:0; left:0; }
    .crop-frame { position:absolute; border:2px solid #fff; box-shadow:0 0 0 9999px rgba(0,0,0,.6); pointer-events:none; z-index:2; }

    /* Emoji picker */
    .emoji-picker { display:none; position:absolute; background:#1a2340; border:1px solid #1e2a45; border-radius:12px; padding:8px; gap:4px; flex-wrap:wrap; z-index:100; box-shadow:0 4px 20px rgba(0,0,0,.4); }
    .emoji-picker.show { display:flex; }
    .emoji-picker span { font-size:20px; cursor:pointer; padding:4px; border-radius:6px; }
    .emoji-picker span:hover { background:rgba(79,142,247,.2); }

    /* Reaction / long press menu */
    .ctx-menu { display:none; position:fixed; background:#1a2340; border:1px solid #1e2a45; border-radius:14px; padding:8px; z-index:200; box-shadow:0 4px 24px rgba(0,0,0,.5); }
    .ctx-menu.show { display:flex; flex-direction:column; gap:2px; }
    .ctx-item { padding:10px 16px; border-radius:8px; cursor:pointer; font-size:14px; display:flex; align-items:center; gap:10px; }
    .ctx-item:hover { background:rgba(79,142,247,.15); }
    .ctx-item.danger { color:#f87171; }
    .ctx-emojis { display:flex; gap:6px; padding:6px 8px; }
    .ctx-emojis span { font-size:22px; cursor:pointer; }

    /* Profile screen */
    #profileScreen { background:#0d1426; overflow-y:auto; }
    .profile-av-wrap { display:flex; justify-content:center; margin-top:24px; position:relative; z-index:1; flex-shrink:0; }
    .profile-info { text-align:center; padding:10px 16px 16px; flex-shrink:0; }
    .profile-info h2 { font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:600; }
    .profile-info .uid { font-size:13px; color:#4f8ef7; margin-top:4px; }
    .profile-info .uname { font-size:12px; color:#4a5568; margin-top:2px; }
    .psection { padding:0 16px 16px; flex-shrink:0; }
    .psection h3 { font-family:'Space Grotesk',sans-serif; font-size:12px; color:#4a5568; margin-bottom:8px; text-transform:uppercase; letter-spacing:.05em; }
    .pbtn { display:flex; align-items:center; gap:12px; padding:14px; background:#1a2340; border-radius:12px; cursor:pointer; margin-bottom:8px; border:none; width:100%; color:#e8eaf0; font-family:'Inter',sans-serif; font-size:14px; text-align:left; }
    .pbtn .ico { font-size:18px; }
    .pbtn.danger { color:#f87171; }
    .edit-name-wrap { display:flex; gap:8px; align-items:center; }
    .edit-name-wrap input { flex:1; background:#0a0f1e; border:1px solid #1e2a45; border-radius:10px; padding:10px 14px; color:#e8eaf0; font-size:14px; outline:none; font-family:'Inter',sans-serif; }
    .edit-name-wrap button { padding:10px 14px; background:#4f8ef7; border:none; border-radius:10px; color:white; font-size:13px; font-weight:600; cursor:pointer; font-family:'Space Grotesk',sans-serif; }

    /* Media grid */
    #mediaScreen { background:#0a0f1e; overflow-y:auto; }
    .media-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2px; padding:2px; }
    .media-thumb { aspect-ratio:1; overflow:hidden; cursor:pointer; position:relative; }
    .media-thumb img, .media-thumb video { width:100%; height:100%; object-fit:cover; }
    .media-thumb .play-icon { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:28px; }

    /* Chat settings */
    #chatSettingsScreen { background:#0d1426; overflow-y:auto; }

    #avatarInput, #chatWallInput, #fileInput { display:none; }
  </style>
</head>
<body>

<!-- ── Contacts ── -->
<div id="contactsScreen" class="screen active">
  <div class="top-bar">
    <h2>Chatly</h2>
    <div class="av av-sm" id="myAvBtn" onclick="showScreen('profileScreen')"></div>
  </div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search name, username or ID..." oninput="renderTab()"/>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('chats',this)">Chats</div>
    <div class="tab" onclick="switchTab('requests',this)" id="reqTab">Requests</div>
    <div class="tab" onclick="switchTab('add',this)">Add</div>
  </div>
  <div class="list" id="mainList"></div>
</div>

<!-- ── Chat ── -->
<div id="chatScreen" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goBack()">&#8592;</button>
    <div class="chat-header-info" onclick="openChatProfile()">
      <div class="av av-md" id="chatAv"></div>
      <div class="chat-header-text">
        <div id="chatName" style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
        <div id="chatStatus" style="font-size:12px;color:#4f8ef7;"></div>
      </div>
    </div>
    <button class="icon-btn" onclick="showToast('Coming soon')" title="Call">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    </button>
    <button class="icon-btn" onclick="showScreen('chatSettingsScreen')">⋮</button>
  </div>
  <div class="e2e">🔒 End-to-end encrypted</div>
  <div class="chat-bg" id="chatBg">
    <div class="typing-bar" id="typingBar"></div>
    <ul id="messages"></ul>
    <div class="reply-bar" id="replyBar">
      <span id="replyText"></span>
      <button class="x" onclick="cancelReply()">×</button>
    </div>
    <div class="input-row" id="inputRow">
      <button class="attach" onclick="document.getElementById('fileInput').click()">📎</button>
      <input type="file" id="fileInput" accept="image/*,video/*,audio/*,*/*" onchange="sendFile(this)"/>
      <input id="msgInput" type="text" placeholder="Message..." autocomplete="off"/>
      <div class="voice-rec-bar" id="voiceRecBar">
        <button class="voice-cancel-btn" id="voiceCancelBtn" onclick="cancelVoiceRec()" type="button">🗑</button>
        <div class="rec-dot" id="recDot"></div>
        <span class="rec-time" id="recTime">0:00</span>
        <span class="rec-hint" id="recHint">Slide right to lock ›</span>
        <button class="voice-pause-btn" id="voicePauseBtn" onclick="toggleVoicePause()" type="button" style="display:none">⏸</button>
      </div>
      <button id="micBtn" type="button">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-4.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <button id="sendBtn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
    <div class="voice-lock-indicator" id="voiceLockHint">🔒 Slide right to lock</div>
  </div>
</div>

<!-- ── Profile ── -->
<div id="profileScreen" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goBack()">&#8592;</button>
    <h2>Profile</h2>
  </div>
  <div class="profile-av-wrap">
    <div class="av av-lg" id="profileAvBig" onclick="document.getElementById('avatarInput').click()"></div>
  </div>
  <div class="profile-info">
    <h2 id="profileDN"></h2>
    <div class="uid" id="profileUID"></div>
    <div class="uname" id="profileUN"></div>
  </div>
  <div class="psection">
    <h3>Display Name</h3>
    <div class="edit-name-wrap">
      <input type="text" id="newNameInput" placeholder="Your display name"/>
      <button onclick="saveName()">Save</button>
    </div>
  </div>
  <div class="psection">
    <button class="pbtn danger" onclick="window.location='/logout'"><span class="ico">🚪</span>Sign out</button>
  </div>
  <input type="file" id="avatarInput" accept="image/*" onchange="openAvatarCrop(this)"/>
</div>

<!-- Avatar crop -->
<div class="crop-modal" id="cropModal">
  <div class="crop-header">
    <button onclick="cancelCrop()">Cancel</button>
    <span>Crop Avatar</span>
    <button class="confirm" onclick="confirmCrop()">Done</button>
  </div>
  <div class="crop-viewport" id="cropViewport">
    <canvas id="cropCanvas"></canvas>
    <div class="crop-frame" id="cropFrame"></div>
  </div>
</div>

<!-- ── Chat Settings ── -->
<div id="chatSettingsScreen" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="showScreen('chatScreen')">&#8592;</button>
    <h2 id="csName"></h2>
  </div>
  <div class="list" style="padding:16px;">
    <div class="psection">
      <h3>Chat Wallpaper</h3>
      <button class="pbtn" onclick="document.getElementById('chatWallInput').click()"><span class="ico">🖼️</span>Set Wallpaper</button>
      <button class="pbtn" onclick="clearChatWall()"><span class="ico">🗑️</span>Remove Wallpaper</button>
      <input type="file" id="chatWallInput" accept="image/*" onchange="setChatWallpaper(this)"/>
    </div>
    <div class="psection">
      <h3>Disappearing Messages</h3>
      <select id="disappearSelect" onchange="saveDisappear()" style="width:100%;background:#1a2340;border:1px solid #1e2a45;border-radius:12px;padding:12px 14px;color:#e8eaf0;font-size:14px;outline:none;">
        <option value="0">Off</option>
        <option value="300">5 minutes</option>
        <option value="3600">1 hour</option>
        <option value="86400">24 hours</option>
        <option value="604800">7 days</option>
      </select>
    </div>
    <div class="psection">
      <button class="pbtn" onclick="openMediaView()"><span class="ico">🖼️</span>Shared Media</button>
      <button class="pbtn danger" onclick="doRemoveFriend()"><span class="ico">❌</span>Remove Friend</button>
    </div>
  </div>
</div>

<!-- ── Media view ── -->
<div id="mediaScreen" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="showScreen('chatSettingsScreen')">&#8592;</button>
    <h2>Shared Media</h2>
  </div>
  <div class="media-grid" id="mediaGrid"></div>
</div>

<!-- Context menu -->
<div class="toast" id="toast"></div>
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-emojis" id="ctxEmojis"></div>
  <div class="ctx-item" onclick="ctxReply()">↩ Reply</div>

// ── E2E ──────────────────────────────────────────────────────
async function initKeys() {
  const stored = localStorage.getItem('privkey_' + me);
  if (stored) {
    myPrivateKey = await crypto.subtle.importKey('jwk', JSON.parse(stored), { name: 'RSA-OAEP', hash: 'SHA-256' }, false, ['decrypt']);
    const pubS = localStorage.getItem('pubkey_' + me);
    if (pubS) {
      myPublicKey = await crypto.subtle.importKey('jwk', JSON.parse(pubS), { name: 'RSA-OAEP', hash: 'SHA-256' }, false, ['encrypt']);
      const chk = await fetch('/pubkey/' + me).then(r => r.json());
      if (!chk.key) await fetch('/save_key', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key: pubS }) });
    }
  } else {
    const pair = await crypto.subtle.generateKey({ name: 'RSA-OAEP', modulusLength: 2048, publicExponent: new Uint8Array([1, 0, 1]), hash: 'SHA-256' }, true, ['encrypt', 'decrypt']);
    myPrivateKey = pair.privateKey; myPublicKey = pair.publicKey;
    const priv = await crypto.subtle.exportKey('jwk', pair.privateKey);
    const pub = await crypto.subtle.exportKey('jwk', pair.publicKey);
    localStorage.setItem('privkey_' + me, JSON.stringify(priv));
    localStorage.setItem('pubkey_' + me, JSON.stringify(pub));
    let saved = false;
    while (!saved) {
      try { const r = await fetch('/save_key', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key: JSON.stringify(pub) }) }); if ((await r.json()).ok) saved = true; }
      catch { await new Promise(r => setTimeout(r, 1000)); }
    }
  }
}

async function getPubKey(username) {
  if (publicKeys[username]) return publicKeys[username];
  const d = await fetch('/pubkey/' + username).then(r => r.json());
  if (!d.key) return null;
  const k = await crypto.subtle.importKey('jwk', JSON.parse(d.key), { name: 'RSA-OAEP', hash: 'SHA-256' }, false, ['encrypt']);
  publicKeys[username] = k; return k;
}

async function enc(key, text) {
  const b = await crypto.subtle.encrypt({ name: 'RSA-OAEP' }, key, new TextEncoder().encode(text));
  return btoa(String.fromCharCode(...new Uint8Array(b)));
}

async function dec(cipher) {
  try {
    const b = Uint8Array.from(atob(cipher), c => c.charCodeAt(0));
    return new TextDecoder().decode(await crypto.subtle.decrypt({ name: 'RSA-OAEP' }, myPrivateKey, b));
  } catch { return '🔒'; }
}

// ── Cloudinary upload ─────────────────────────────────────────
async function cloudUpload(file) {
  const type = file.type.startsWith('video') ? 'video' : file.type.startsWith('image') ? 'image' : file.type.startsWith('audio') ? 'video' : 'raw';
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/${type === 'raw' ? 'raw' : type}/upload`, { method: 'POST', body: fd });
  const d = await res.json();
  return { url: d.secure_url, type: file.type.startsWith('video') || file.type.startsWith('audio') ? 'video' : file.type.startsWith('image') ? 'image' : 'file' };
}

// ── Avatar crop ───────────────────────────────────────────────
let cropState = null;

function openAvatarCrop(input) {
  const file = input.files[0];
  input.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const vp = document.getElementById('cropViewport');
      const canvas = document.getElementById('cropCanvas');
      const frame = document.getElementById('cropFrame');
      const vw = vp.clientWidth;
      const vh = vp.clientHeight;
      const size = Math.min(vw, vh) * 0.75;
      canvas.width = vw;
      canvas.height = vh;
      frame.style.width = size + 'px';
      frame.style.height = size + 'px';
      frame.style.left = (vw - size) / 2 + 'px';
      frame.style.top = (vh - size) / 2 + 'px';
      const scale = Math.max(size / img.width, size / img.height);
      cropState = { img, canvas, vw, vh, size, scale, offsetX: (vw - img.width * scale) / 2, offsetY: (vh - img.height * scale) / 2, lastDist: 0, lastX: 0, lastY: 0, dragging: false, pinching: false };
      drawCrop();
      document.getElementById('cropModal').classList.add('show');
      setupCropGestures(vp);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function drawCrop() {
  if (!cropState) return;
  const { img, canvas, vw, vh, scale, offsetX, offsetY } = cropState;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, vw, vh);
  ctx.drawImage(img, offsetX, offsetY, img.width * scale, img.height * scale);
}

function setupCropGestures(vp) {
  vp.onmousedown = e => { if (e.button !== 0) return; cropState.dragging = true; cropState.lastX = e.clientX; cropState.lastY = e.clientY; };
  vp.onmousemove = e => { if (!cropState?.dragging) return; cropState.offsetX += e.clientX - cropState.lastX; cropState.offsetY += e.clientY - cropState.lastY; cropState.lastX = e.clientX; cropState.lastY = e.clientY; drawCrop(); };
  vp.onmouseup = () => { if (cropState) cropState.dragging = false; };
  vp.onwheel = e => { e.preventDefault(); if (!cropState) return; const f = e.deltaY < 0 ? 1.08 : 0.92; const mx = e.clientX - vp.getBoundingClientRect().left; const my = e.clientY - vp.getBoundingClientRect().top; cropState.offsetX = mx - (mx - cropState.offsetX) * f; cropState.offsetY = my - (my - cropState.offsetY) * f; cropState.scale *= f; drawCrop(); };
  vp.ontouchstart = e => {
    if (e.touches.length === 1) { cropState.dragging = true; cropState.lastX = e.touches[0].clientX; cropState.lastY = e.touches[0].clientY; }
    else if (e.touches.length === 2) { cropState.pinching = true; cropState.lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
  };
  vp.ontouchmove = e => {
    e.preventDefault();
    if (!cropState) return;
    if (e.touches.length === 1 && cropState.dragging && !cropState.pinching) {
      cropState.offsetX += e.touches[0].clientX - cropState.lastX;
      cropState.offsetY += e.touches[0].clientY - cropState.lastY;
      cropState.lastX = e.touches[0].clientX;
      cropState.lastY = e.touches[0].clientY;
      drawCrop();
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - vp.getBoundingClientRect().left;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - vp.getBoundingClientRect().top;
      const f = dist / (cropState.lastDist || dist);
      cropState.offsetX = cx - (cx - cropState.offsetX) * f;
      cropState.offsetY = cy - (cy - cropState.offsetY) * f;
      cropState.scale *= f;
      cropState.lastDist = dist;
      drawCrop();
    }
  };
  vp.ontouchend = () => { if (cropState) { cropState.dragging = false; cropState.pinching = false; cropState.lastDist = 0; } };
}

function cancelCrop() {
  document.getElementById('cropModal').classList.remove('show');
  cropState = null;
}

async function confirmCrop() {
  if (!cropState) return;
  const { canvas, vw, vh, size } = cropState;
  const fx = (vw - size) / 2;
  const fy = (vh - size) / 2;
  const out = document.createElement('canvas');
  out.width = 512;
  out.height = 512;
  const ctx = out.getContext('2d');
  ctx.drawImage(canvas, fx, fy, size, size, 0, 0, 512, 512);
  out.toBlob(async blob => {
    cancelCrop();
    if (blob) await uploadAvatarBlob(blob);
  }, 'image/jpeg', 0.92);
}

// ── Tabs ──────────────────────────────────────────────────────
function switchTab(tab, el) {

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('searchInput').value = '';

}

async function renderTab() {
  const list = document.getElementById('mainList');
  list.innerHTML = '';
  const q = document.getElementById('searchInput').value.toLowerCase();

  if (currentTab === 'chats') {
    const friends = await fetch('/friends').then(r => r.json());
    const filtered = friends.filter(u => !q || u.display_name.toLowerCase().includes(q) || (u.user_id||'').includes(q));
    if (!filtered.length) { list.innerHTML = '<div class="empty">No friends yet.<br>Go to Add tab.</div>'; return; }
    filtered.forEach(u => list.appendChild(makeUserItem(u, 'friend')));

  } else if (currentTab === 'requests') {
    const reqs = await fetch('/friend_requests').then(r => r.json());
    if (!reqs.length) { list.innerHTML = '<div class="empty">No pending requests.</div>'; return; }
    reqs.forEach(sender => {
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `<div class="av av-md">${sender[0].toUpperCase()}</div>
        <div class="item-info"><div class="name">${sender}</div><div class="sub">wants to connect</div></div>
        <div class="act-btns">

          <button class="btn-xs btn-red" onclick="respondReq('${sender}','decline')">✗</button>
        </div>`;

    });

    const users = await fetch('/users?q=' + encodeURIComponent(q)).then(r => r.json());
    if (!users.length) { list.innerHTML = '<div class="empty">No users found.</div>'; return; }
    users.forEach(u => list.appendChild(makeUserItem(u, 'add')));

}

function makeUserItem(u, mode) {
  const div = document.createElement('div');
  div.className = 'item';
  const badge = u.online ? '<div class="online-dot"></div>' : '';
  const avC = u.avatar_url ? `<img src="${u.avatar_url}"/>` : (u.display_name||u.user_id)[0].toUpperCase();

  if (mode === 'add') action = `<button class="btn-xs btn-outline" onclick="addFriend('${u.user_id}')">Add</button>`;
  if (mode === 'friend') action = `<button class="remove-btn" onclick="removeFriend(event,'${u.user_id}')">✕</button>`;
  div.innerHTML = `
    <div class="av av-md">${avC}${badge}</div>
    <div class="item-info">
      <div class="name">${u.display_name || u.username}</div>
      <div class="sub">#${u.user_id||'0000'} · ${u.online?'online':'offline'}</div>
    </div>${action}`;
  if (mode === 'friend') div.onclick = e => { if (!e.target.classList.contains('remove-btn')) openChat(u.user_id); };
  return div;
}

async function addFriend(to) {

async function removeFriend(e, username) {

  if (!confirm('Remove ' + username + '?')) return;
  await fetch('/remove_friend/' + username, { method: 'POST' });

async function openChat(username) {
  currentChat = username;
  document.getElementById('chatName').textContent = username;
  document.getElementById('chatStatus').textContent = onlineUsers.includes(username) ? 'online' : 'offline';
  document.getElementById('messages').innerHTML = '';
  document.getElementById('csName').textContent = username;
  cancelReply();
  cancelVoiceRec();
  showScreen('chatScreen');

  // Avatar
  const up = await fetch('/profile/' + username).then(r => r.json());
  const avEl = document.getElementById('chatAv');
  avEl.innerHTML = up.avatar_url ? `<img src="${up.avatar_url}"/>` : (up.display_name||username)[0].toUpperCase();
  document.getElementById('chatName').textContent = up.display_name || username;

  // Chat wallpaper
  const cs = await fetch('/chat_settings/' + username).then(r => r.json());

  document.getElementById('disappearSelect').value = cs.disappear_timer || 0;

function openChatProfile() {
  if (!currentChat) return;

async function renderMsg(m, isSent, prepend = false) {
  const ul = document.getElementById('messages');
  const li = document.createElement('li');
  li.id = 'msg-' + m.id;
  if (isSent) li.classList.add('sent');

  let html = `<div class="msender">${isSent ? 'You' : m.sender}</div>`;
  if (m.reply_to) html += `<div class="reply-prev">↩ ${m.reply_to}</div>`;

  if (m.deleted) {
    html += `<span class="del-text">This message was deleted</span>`;
  } else if (m.msg_type === 'image') {
    html += `<img src="${m.media_url}" class="cmedia" onclick="window.open('${m.media_url}','_blank')"/>
      <a href="${m.media_url}" download class="dload">⬇ Save image</a>`;
  } else if (m.msg_type === 'voice') {
    html += `<audio src="${m.media_url}" controls style="max-width:220px;margin-top:4px;"></audio>`;
  } else if (m.msg_type === 'video' && m.media_url && /\.(webm|ogg|mp3|m4a|wav)(\?|$)/i.test(m.media_url)) {
    html += `<audio src="${m.media_url}" controls style="max-width:220px;margin-top:4px;"></audio>`;
  } else if (m.msg_type === 'video') {
    html += `<video src="${m.media_url}" class="cmedia" controls></video>
      <a href="${m.media_url}" download class="dload">⬇ Save video</a>`;
  } else if (m.msg_type === 'file') {
    html += `<a href="${m.media_url}" target="_blank" class="dload">📄 Download file</a>`;
  } else {
    const plain = isSent ? (m.sender_message ? await dec(m.sender_message) : '🔒') : await dec(m.message);
    html += `<span>${plain}</span>`;
  }

  // Reactions
  if (m.reactions && Object.keys(m.reactions).length) {
    html += `<div class="reactions">`;
    for (const [emoji, users] of Object.entries(m.reactions)) {
      html += `<span class="rxn" onclick="reactTo(${m.id},'${emoji}')">${emoji} ${users.length}</span>`;
    }
    html += `</div>`;
  }

  // Ticks (only for sent)
  if (isSent) {
    html += `<div class="ticks ${m.seen ? 'seen' : ''}">${m.seen ? '✓✓' : '✓'}</div>`;
  }

  li.innerHTML = '<div class="reply-drag-icon">↩</div>' + html;

  // Long press → context menu + drag-to-reply
  let pressTimer, dragStartX = 0, dragging = false, dragTriggered = false;
  const threshold = 60;

  li.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    dragStartX = e.touches[0].clientX;
    dragging = false;
    dragTriggered = false;
    pressTimer = setTimeout(() => { if (!dragging) showCtxMenu(e, m, isSent); }, 500);
  }, { passive: true });

  li.addEventListener('touchmove', e => {
    if (e.touches.length !== 1) return;
    clearTimeout(pressTimer);
    const diff = e.touches[0].clientX - dragStartX;
    const valid = isSent ? diff < 0 : diff > 0;
    if (!valid) { li.style.transform = ''; li.classList.remove('dragging'); dragging = false; return; }
    dragging = true;
    const clamped = isSent ? Math.max(diff, -threshold * 1.2) : Math.min(diff, threshold * 1.2);
    li.style.transform = `translateX(${clamped}px)`;
    li.classList.add('dragging');
    if (Math.abs(diff) >= threshold) dragTriggered = true;
  }, { passive: true });

  li.addEventListener('touchend', e => {
    clearTimeout(pressTimer);
    li.classList.remove('dragging');
    li.style.transform = '';
    if (dragging && dragTriggered) {
      const text = li.querySelector('span:not(.del-text)') ? li.querySelector('span:not(.del-text)').textContent : (m.msg_type === 'image' ? '[image]' : m.msg_type === 'video' ? '[media]' : '[message]');
      setReply(text);
    }
    dragging = false;
  }, { passive: true });

  li.addEventListener('touchcancel', () => {
    clearTimeout(pressTimer);
    li.classList.remove('dragging');
    li.style.transform = '';
    dragging = false;
  }, { passive: true });

  // Mouse drag-to-reply (desktop)
  let mouseDown = false, mouseStartX = 0;
  li.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    mouseDown = true;
    mouseStartX = e.clientX;
    dragTriggered = false;
  });
  li.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    const diff = e.clientX - mouseStartX;
    const valid = isSent ? diff < 0 : diff > 0;
    if (!valid) { li.style.transform = ''; li.classList.remove('dragging'); return; }
    const clamped = isSent ? Math.max(diff, -threshold * 1.2) : Math.min(diff, threshold * 1.2);
    li.style.transform = `translateX(${clamped}px)`;
    li.classList.add('dragging');
    if (Math.abs(diff) >= threshold) dragTriggered = true;
  });
  li.addEventListener('mouseup', () => {
    if (!mouseDown) return;
    mouseDown = false;
    li.classList.remove('dragging');
    li.style.transform = '';
    if (dragTriggered) {
      const text = li.querySelector('span:not(.del-text)') ? li.querySelector('span:not(.del-text)').textContent : '[message]';
      setReply(text);
    }
  });
  li.addEventListener('mouseleave', () => {
    if (!mouseDown) return;
    mouseDown = false;
    li.classList.remove('dragging');
    li.style.transform = '';
  });

  if (prepend) ul.prepend(li); else ul.appendChild(li);
  if (!prepend) li.scrollIntoView({ behavior: 'smooth' });
}

// ── Context menu ──────────────────────────────────────────────
const EMOJIS = ['❤️','😂','😮','😢','👍','🔥'];

function showCtxMenu(e, m, isSent) {
  ctxMsgId = m.id;
  ctxMsgSender = m.sender;
  ctxMsgText = m.msg_type === 'text' && !m.deleted ? (document.getElementById('msg-' + m.id)?.querySelector('span')?.textContent || '') : '';
  const menu = document.getElementById('ctxMenu');
  const emojis = document.getElementById('ctxEmojis');
  emojis.innerHTML = EMOJIS.map(em => `<span onclick="reactTo(${m.id},'${em}');hideCtx()">${em}</span>`).join('');
  document.getElementById('ctxDelete').style.display = isSent && !m.deleted ? 'flex' : 'none';
  menu.classList.add('show');
  const touch = e.touches ? e.touches[0] : e;
  const x = Math.min(touch.clientX, window.innerWidth - 180);
  const y = Math.min(touch.clientY, window.innerHeight - 200);
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  document.addEventListener('touchstart', hideCtxOnOutside, { once: true });
}

function hideCtxOnOutside(e) {
  if (!document.getElementById('ctxMenu').contains(e.target)) hideCtx();
}

function hideCtx() {
  document.getElementById('ctxMenu').classList.remove('show');
}

function ctxReply() {
  if (ctxMsgText) setReply(ctxMsgText);
  hideCtx();
}

function ctxForward() {
  hideCtx();
  if (!ctxMsgText) { alert('Can only forward text messages'); return; }
  const friends = prompt('Forward to username:');
  if (friends && ctxMsgText) {
    alert('Forwarding: "' + ctxMsgText + '" to ' + friends + '\n(Open chat with them to forward)');
  }
}

async function ctxDeleteMsg() {
  hideCtx();
  if (!ctxMsgId) return;
  await fetch('/delete_message/' + ctxMsgId, { method: 'POST' });
  const li = document.getElementById('msg-' + ctxMsgId);
  if (li) li.querySelector('span') ? li.querySelector('span').textContent = 'This message was deleted' : null;
}

async function reactTo(msgId, emoji) {
  await fetch('/react/' + msgId, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ emoji }) });
}

// ── Reply ─────────────────────────────────────────────────────
function setReply(text) {
  replyingTo = text.length > 60 ? text.slice(0, 60) + '…' : text;
  document.getElementById('replyText').textContent = '↩ ' + replyingTo;
  document.getElementById('replyBar').style.display = 'block';
  document.getElementById('msgInput').focus();
}

function cancelReply() {
  replyingTo = null;
  document.getElementById('replyBar').style.display = 'none';
  document.getElementById('replyText').textContent = '';
}

// ── Send ──────────────────────────────────────────────────────
async function sendMsg() {
  const input = document.getElementById('msgInput');
  const msg = input.value.trim();
  if (!msg || !currentChat) return;
  const rKey = await getPubKey(currentChat);
  if (!rKey) { alert('Cannot get recipient key'); return; }
  const eR = await enc(rKey, msg);
  const eS = await enc(myPublicKey, msg);
  socket.emit('private_message', { receiver: currentChat, message: eR, sender_message: eS, msg_type: 'text', reply_to: replyingTo || '' });
  cancelReply();
  input.value = '';
  socket.emit('typing', { receiver: currentChat, typing: false });
}

async function sendFile(input) {
  const file = input.files[0];
  if (!file || !currentChat) return;
  const { url, type } = await cloudUpload(file);
  socket.emit('private_message', { receiver: currentChat, message: '', sender_message: '', msg_type: type, media_url: url, reply_to: replyingTo || '' });
  cancelReply();
  input.value = '';
}

// ── Voice messages ────────────────────────────────────────────
let voiceRec = null, voiceChunks = [], voiceStream = null, voiceLocked = false, voicePaused = false;
let voiceStartTime = 0, voiceTimerInterval = null, voiceMicStartX = 0, voiceMicActive = false;

function updateSendMic() {
  const hasText = document.getElementById('msgInput').value.trim().length > 0;
  document.getElementById('sendBtn').style.display = (hasText || voiceLocked) ? 'flex' : 'none';
  document.getElementById('micBtn').style.display = (!hasText && !voiceLocked) ? 'flex' : 'none';
  document.getElementById('sendBtn').onclick = voiceLocked ? sendVoiceMsg : sendMsg;
}

function formatRecTime(ms) {
  const s = Math.floor(ms / 1000);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

function showVoiceUI(locked) {
  document.getElementById('msgInput').style.display = 'none';
  document.getElementById('micBtn').style.display = 'none';
  document.getElementById('voiceRecBar').classList.add('active');
  document.getElementById('voiceCancelBtn').style.display = locked ? 'block' : 'none';
  document.getElementById('voicePauseBtn').style.display = locked ? 'block' : 'none';
  document.getElementById('recHint').textContent = locked ? 'Recording locked' : 'Slide right to lock ›';
  document.getElementById('recHint').classList.toggle('locked', locked);
  document.getElementById('voiceLockHint').classList.toggle('show', !locked);
  document.getElementById('micBtn').classList.add('recording');
  updateSendMic();
}

function hideVoiceUI() {
  document.getElementById('msgInput').style.display = '';
  document.getElementById('voiceRecBar').classList.remove('active');
  document.getElementById('voiceLockHint').classList.remove('show');
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('recDot').classList.remove('paused');
  document.getElementById('voicePauseBtn').textContent = '⏸';
  document.getElementById('recTime').textContent = '0:00';
  clearInterval(voiceTimerInterval);
  voiceTimerInterval = null;
  voiceLocked = false;
  voicePaused = false;
  voiceMicActive = false;
  updateSendMic();
}

async function startVoiceRec() {
  if (!currentChat || voiceRec) return;
  try {
    voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch { showToast('Microphone access denied'); return; }
  voiceChunks = [];
  const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
  voiceRec = new MediaRecorder(voiceStream, { mimeType: mime });
  voiceRec.ondataavailable = e => { if (e.data.size) voiceChunks.push(e.data); };
  voiceRec.onstop = () => { if (voiceStream) { voiceStream.getTracks().forEach(t => t.stop()); voiceStream = null; } };
  voiceRec.start(100);
  voiceStartTime = Date.now();
  voiceMicActive = true;
  voiceTimerInterval = setInterval(() => {
    if (!voicePaused) document.getElementById('recTime').textContent = formatRecTime(Date.now() - voiceStartTime);
  }, 200);
  showVoiceUI(false);
}

function resetVoiceRec() {
  if (voiceRec && voiceRec.state !== 'inactive') voiceRec.stop();
  voiceRec = null;
  voiceChunks = [];
  hideVoiceUI();
}

function cancelVoiceRec() {
  resetVoiceRec();
}

function toggleVoicePause() {
  if (!voiceRec || !voiceLocked) return;
  if (voicePaused) {
    voiceRec.resume();
    voicePaused = false;
    document.getElementById('recDot').classList.remove('paused');
    document.getElementById('voicePauseBtn').textContent = '⏸';
  } else {
    voiceRec.pause();
    voicePaused = true;
    document.getElementById('recDot').classList.add('paused');
    document.getElementById('voicePauseBtn').textContent = '▶';
  }
}

function lockVoiceRec() {
  if (!voiceRec) return;
  voiceLocked = true;
  document.getElementById('voiceLockHint').classList.remove('show');
  showVoiceUI(true);
}

async function sendVoiceMsg() {
  const rec = voiceRec;
  if (!rec && !voiceChunks.length) return;
  if (rec && rec.state !== 'inactive') {
    await new Promise(resolve => { rec.addEventListener('stop', resolve, { once: true }); rec.stop(); });
  }
  const chunks = voiceChunks.slice();
  voiceRec = null;
  voiceChunks = [];
  hideVoiceUI();
  if (!chunks.length || !currentChat) return;
  const blob = new Blob(chunks, { type: chunks[0].type || 'audio/webm' });
  if (blob.size < 500) return;
  const file = new File([blob], 'voice.webm', { type: blob.type });
  const { url } = await cloudUpload(file);
  socket.emit('private_message', { receiver: currentChat, message: '', sender_message: '', msg_type: 'voice', media_url: url, reply_to: replyingTo || '' });
  cancelReply();
}

(function initVoiceMic() {
  const mic = document.getElementById('micBtn');
  mic.addEventListener('touchstart', e => {
    e.preventDefault();
    voiceMicStartX = e.touches[0].clientX;
    startVoiceRec();
  }, { passive: false });
  mic.addEventListener('touchmove', e => {
    if (!voiceRec || voiceLocked) return;
    if (e.touches[0].clientX - voiceMicStartX > 70) lockVoiceRec();
  }, { passive: true });
  mic.addEventListener('touchend', e => {
    if (!voiceRec || voiceLocked) return;
    e.preventDefault();
    if (Date.now() - voiceStartTime < 500) cancelVoiceRec();
    else sendVoiceMsg();
  }, { passive: false });
  mic.addEventListener('mousedown', e => {
    e.preventDefault();
    voiceMicStartX = e.clientX;
    startVoiceRec();
  });
  document.addEventListener('mousemove', e => {
    if (!voiceMicActive || !voiceRec || voiceLocked) return;
    if (e.clientX - voiceMicStartX > 70) lockVoiceRec();
  });
  document.addEventListener('mouseup', () => {
    if (!voiceMicActive || voiceLocked) return;
    if (Date.now() - voiceStartTime < 500) cancelVoiceRec();
    else sendVoiceMsg();
  });
})();

// ── Chat settings ─────────────────────────────────────────────
async function setChatWallpaper(input) {
  const file = input.files[0]; if (!file) return;
  const { url } = await cloudUpload(file);
  await fetch('/update_chat_settings/' + currentChat, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ wallpaper_url: url, disappear_timer: parseInt(document.getElementById('disappearSelect').value) }) });
  document.getElementById('chatBg').style.backgroundImage = `url(${url})`;
  input.value = '';
}

async function clearChatWall() {
  await fetch('/update_chat_settings/' + currentChat, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ wallpaper_url: null, disappear_timer: parseInt(document.getElementById('disappearSelect').value) }) });
  document.getElementById('chatBg').style.backgroundImage = '';
}

async function saveDisappear() {
  const timer = parseInt(document.getElementById('disappearSelect').value);
  const cs = await fetch('/chat_settings/' + currentChat).then(r => r.json());
  await fetch('/update_chat_settings/' + currentChat, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ wallpaper_url: cs.wallpaper_url, disappear_timer: timer }) });
}

async function doRemoveFriend() {
  if (!confirm('Remove ' + currentChat + ' as friend?')) return;
  await fetch('/remove_friend/' + currentChat, { method: 'POST' });
  showScreen('contactsScreen');
  currentChat = null;
  renderTab();
}

// ── Media view ────────────────────────────────────────────────
async function openMediaView() {
  showScreen('mediaScreen');
  const media = await fetch('/media/' + currentChat).then(r => r.json());
  const grid = document.getElementById('mediaGrid');
  grid.innerHTML = '';
  if (!media.length) { grid.innerHTML = '<div class="empty" style="grid-column:span 3">No shared media</div>'; return; }
  media.forEach(m => {
    const div = document.createElement('div');
    div.className = 'media-thumb';
    if (m.type === 'image') {
      div.innerHTML = `<img src="${m.url}" onclick="window.open('${m.url}','_blank')"/>`;
    } else {
      div.innerHTML = `<video src="${m.url}"></video><div class="play-icon">▶</div>`;
      div.onclick = () => window.open(m.url, '_blank');
    }
    grid.appendChild(div);
  });
}

// ── Socket events ─────────────────────────────────────────────
socket.on('private_message', async function(data) {
  if (data.sender !== currentChat && !data.is_own) return;
  const m = {
    id: data.id,
    sender: data.is_own ? me : data.sender,
    message: data.message,
    sender_message: data.message,
    msg_type: data.msg_type || 'text',
    media_url: data.media_url || '',
    reply_to: data.reply_to || '',
    reactions: {},
    deleted: false,
    seen: false
  };
  await renderMsg(m, !!data.is_own);
  if (!data.is_own && currentChat) socket.emit('seen', { sender: data.sender });
});

socket.on('typing', function(data) {
  if (data.sender !== currentChat) return;
  const bar = document.getElementById('typingBar');
  bar.textContent = data.typing ? data.sender + ' is typing...' : '';
  bar.style.display = data.typing ? 'block' : 'none';
});

socket.on('seen', function(data) {
  document.querySelectorAll('#messages li.sent .ticks').forEach(t => {
    t.textContent = '✓✓'; t.classList.add('seen');
  });
});

socket.on('message_deleted', function(data) {
  const li = document.getElementById('msg-' + data.id);
  if (li) {
    const span = li.querySelector('span');
    if (span) { span.textContent = 'This message was deleted'; span.className = 'del-text'; }
  }
});

socket.on('reaction_update', function(data) {
  const li = document.getElementById('msg-' + data.msg_id);
  if (!li) return;
  let rxnDiv = li.querySelector('.reactions');
  if (!rxnDiv) { rxnDiv = document.createElement('div'); rxnDiv.className = 'reactions'; li.appendChild(rxnDiv); }
  rxnDiv.innerHTML = Object.entries(data.reactions).map(([em, users]) =>
    `<span class="rxn" onclick="reactTo(${data.msg_id},'${em}');hideCtx()">${em} ${users.length}</span>`
  ).join('');
});

socket.on('friend_request', () => {
  document.getElementById('reqTab').innerHTML = `Requests<span class="ndot"></span>`;
});

socket.on('request_accepted', () => renderTab());

socket.on('user_list_update', users => {
  onlineUsers = users;
  if (currentChat) document.getElementById('chatStatus').textContent = users.includes(currentChat) ? 'online' : 'offline';
});

// Typing indicator emit
document.getElementById('msgInput').addEventListener('input', () => {
  updateSendMic();
  if (!currentChat) return;
  socket.emit('typing', { receiver: currentChat, typing: true });
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => socket.emit('typing', { receiver: currentChat, typing: false }), 1500);
});

document.getElementById('msgInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });
updateSendMic();

// ── Init ──────────────────────────────────────────────────────
initKeys().then(async () => {
  socket.connect();
  await loadProfile();
  renderTab();
});
</script>
